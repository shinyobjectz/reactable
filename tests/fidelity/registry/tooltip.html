<!doctype html>
<!-- generated by wavelet-ui — Tooltip (ported from Remocn) -->
<html><head><style>
  html, body { margin:0; width:100%; height:100%; background:#0c0c12; overflow:hidden; }
  @keyframes wl-tip-30-in { from { opacity:0; transform:translate(-50%, 4px) scale(0.96); } to { opacity:1; transform:translate(-50%, 0) scale(1); } }
.wl-tip-30 { position:relative; display:inline-flex; }
.wl-tip-30 .anchor { padding:10px 18px; border:1px solid oklch(1 0 0 / 10%); border-radius:10px; font:500 15px/1 sans-serif; color:oklch(0.985 0 0); background:oklch(0.205 0 0); }
.wl-tip-30 .tip { position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:oklch(0.922 0 0); color:oklch(0.205 0 0); font:500 13px/1 sans-serif; padding:7px 10px; border-radius:6px; white-space:nowrap; animation:wl-tip-30-in 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) both; animation-delay:0.5s; }
.wl-tip-30 .arrow { position:absolute; top:100%; left:50%; margin-left:-4px; width:8px; height:8px; background:oklch(0.922 0 0); transform:rotate(45deg); margin-top:-4px; }
</style></head>
<body>
<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><div class="wl-tip-30"><span class="anchor">Hover me</span><span class="tip">Copied!<span class="arrow"></span></span></div></div>
</body></html>
