<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #e5e5e5; font: 14px/1.4 ui-sans-serif, system-ui, sans-serif; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
    .fallback {
      display: none; position: absolute; inset: 0; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; padding: 32px; text-align: center;
    }
    .fallback p { color: #9ca3af; max-width: 28rem; }
    .fallback code { color: #c4b5fd; font: 0.9em ui-monospace, monospace; }
  </style>
</head>
<body>
  <video id="v" controls playsinline preload="auto" muted>
    <source src="/reactable/labs/sample.mp4?deck=showcase" type="video/mp4" />
  </video>
  <div class="fallback" id="err">
    <p>Video source unreachable. Add <code>sample.mp4</code> under <code>decks/showcase/labs/</code>.</p>
  </div>
  <script>
    const v = document.getElementById('v');
    const err = document.getElementById('err');
    v.addEventListener('error', () => { v.style.display = 'none'; err.style.display = 'flex'; });
    v.play().then(() => { v.muted = false; }).catch(() => { v.controls = true; });
  </script>
</body>
</html>
