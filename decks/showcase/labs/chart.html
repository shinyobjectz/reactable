<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chart lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 100%; height: 100%; background: #0a0a0f; color: #e5e5e5; font: 14px/1.4 ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
    .wrap { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 48px; gap: 24px; }
    h1 { font-size: 1.5rem; font-weight: 600; }
    .sub { color: #9ca3af; font-size: 13px; }
    .chart { flex: 1; display: flex; align-items: flex-end; gap: 20px; min-height: 0; }
    .bar {
      flex: 1; background: linear-gradient(180deg, #6366f1, #4338ca);
      border-radius: 8px 8px 0 0; min-height: 8px;
      animation: grow 1.2s ease-out both;
    }
    .bar:nth-child(1) { animation-delay: .1s; height: 45%; }
    .bar:nth-child(2) { animation-delay: .2s; height: 72%; }
    .bar:nth-child(3) { animation-delay: .3s; height: 58%; }
    .bar:nth-child(4) { animation-delay: .4s; height: 90%; }
    .bar:nth-child(5) { animation-delay: .5s; height: 64%; }
    @keyframes grow { from { transform: scaleY(0); transform-origin: bottom; } }
    .labels { display: flex; gap: 20px; font: 11px ui-monospace, monospace; color: #6b7280; }
    .labels span { flex: 1; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>Local app</h1>
      <p class="sub">Full-bleed iframe — served from decks/showcase/labs/</p>
    </div>
    <div class="chart" aria-hidden="true">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="labels"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span></div>
  </div>
</body>
</html>
