<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reactable lab — whiteboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; background: #111; color: #e5e5e5; font: 13px/1 ui-sans-serif, system-ui, sans-serif; }
    .bar {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: rgba(22,22,24,.95); border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .bar span { color: #9ca3af; margin-right: 8px; font-size: 12px; }
    button, label.btn {
      border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06);
      color: #ddd; padding: 6px 12px; border-radius: 8px; font: inherit; cursor: pointer;
    }
    button:hover, label.btn:hover { background: rgba(255,255,255,.12); }
    button.active { background: rgba(99,102,241,.4); border-color: rgba(99,102,241,.55); color: #fff; }
    input[type=color] { width: 32px; height: 28px; border: 0; padding: 0; background: none; cursor: pointer; }
    canvas { display: block; width: 100%; height: calc(100% - 45px); cursor: crosshair; touch-action: none; }
  </style>
</head>
<body>
  <div class="bar">
    <span>Whiteboard lab</span>
    <button id="pen" class="active">Pen</button>
    <button id="erase">Eraser</button>
    <label class="btn">Color <input type="color" id="color" value="#a78bfa" /></label>
    <button id="clear">Clear</button>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let drawing = false, erasing = false, color = '#a78bfa', line = 3;
    const resize = () => {
      const dpr = devicePixelRatio || 1;
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    };
    resize();
    addEventListener('resize', resize);

    const pos = (e) => {
      const r = canvas.getBoundingClientRect();
      const t = e.touches?.[0] || e;
      return { x: t.clientX - r.left, y: t.clientY - r.top };
    };
    const start = (e) => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); };
    const move = (e) => {
      if (!drawing) return;
      const p = pos(e);
      ctx.strokeStyle = erasing ? '#111' : color;
      ctx.lineWidth = erasing ? 24 : line;
      ctx.globalCompositeOperation = erasing ? 'destination-out' : 'source-over';
      ctx.lineTo(p.x, p.y); ctx.stroke();
      e.preventDefault();
    };
    const end = () => { drawing = false; };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    addEventListener('touchend', end);

    document.getElementById('pen').onclick = () => {
      erasing = false;
      document.getElementById('pen').classList.add('active');
      document.getElementById('erase').classList.remove('active');
    };
    document.getElementById('erase').onclick = () => {
      erasing = true;
      document.getElementById('erase').classList.add('active');
      document.getElementById('pen').classList.remove('active');
    };
    document.getElementById('color').oninput = (e) => { color = e.target.value; erasing = false; };
    document.getElementById('clear').onclick = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    };
  </script>
</body>
</html>
