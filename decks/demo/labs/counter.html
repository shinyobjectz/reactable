<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reactable lab — counter</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; background: #0e0e12; color: #f2f2f2; font: 16px/1.4 ui-sans-serif, system-ui, sans-serif; }
    .wrap {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 24px; padding: 32px;
    }
    h1 { font-size: 1.1rem; font-weight: 600; color: #9ca3af; letter-spacing: .04em; text-transform: uppercase; }
    .value { font: 96px/1 ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    button {
      border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06);
      color: #eee; padding: 12px 20px; border-radius: 12px; font: inherit; cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,.12); }
    button.primary { background: rgba(99,102,241,.35); border-color: rgba(99,102,241,.5); }
    .hint { font-size: 13px; color: #6b7280; max-width: 28rem; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Local app · served from this repo</h1>
    <div class="value" id="n">0</div>
    <div class="row">
      <button id="dec">−</button>
      <button class="primary" id="inc">+</button>
      <button id="reset">Reset</button>
    </div>
    <p class="hint">Served by nexus at <code>/reactable/labs/counter.html</code> — clicks and state persist in <code>localStorage</code> while you record.</p>
  </div>
  <script>
    const key = 'reactable-demo-counter';
    const el = document.getElementById('n');
    let n = Number(localStorage.getItem(key) || 0);
    const render = () => { el.textContent = n; localStorage.setItem(key, String(n)); };
    document.getElementById('inc').onclick = () => { n++; render(); };
    document.getElementById('dec').onclick = () => { n--; render(); };
    document.getElementById('reset').onclick = () => { n = 0; render(); };
    render();
  </script>
</body>
</html>
