<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dashboard — Reactable</title><link rel="preconnect" href="https://api.fontshare.com"/><link href="https://api.fontshare.com/v2/css?f[]=sentient@300,301,400,401&display=swap" rel="stylesheet"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/><style>
  :root { --ink:#e9e7e2; --dim:#8f8d88; --faint:#4a4947; --bg:#101010; --card:#141414; --line:#232220; --green:#7dd08b; --amber:#e0b070; --red:#e07070; --metal:linear-gradient(135deg,#b9b9bd,#f2f2f4 38%,#97979d 62%,#dedee2); }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--ink); font:14px/1.6 "Spline Sans Mono", ui-monospace, monospace; -webkit-font-smoothing:antialiased; }
  .shell { display:grid; grid-template-columns:230px 1fr; min-height:100vh; }
  aside { border-right:1px solid var(--line); padding:26px 18px; display:flex; flex-direction:column; gap:4px; position:sticky; top:0; height:100vh; }
  .brand { display:flex; align-items:center; gap:10px; padding:0 10px 26px; text-decoration:none; color:var(--ink); }
  .mark { width:20px; height:20px; } .mark path { fill:var(--ink); }
  .word { font:400 15px Sentient, Georgia, serif; }
  aside a.nv { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px; color:var(--dim); text-decoration:none; font-size:13px; }
  aside a.nv:hover, aside a.nv.on { color:var(--ink); background:#161615; }
  .ni { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
  aside .foot { margin-top:auto; border-top:1px solid var(--line); padding-top:14px; }
  main { padding:40px 48px 100px; max-width:980px; }
  h1 { font:300 30px Sentient, Georgia, serif; margin-bottom:4px; } h1 em { font-style:italic; font-weight:400; }
  .sub { color:var(--dim); font-size:12.5px; }
  h2.sec { font:400 16px Sentient, Georgia, serif; margin:44px 0 16px; }
  .cards { display:grid; gap:18px; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); }
  .card { border:1px solid var(--line); border-radius:16px; background:var(--card); padding:26px; }
  .big { font:400 32px Sentient, Georgia, serif; } .big span { font:400 12px "Spline Sans Mono",monospace; color:var(--dim); }
  .coin { width:20px; height:20px; border-radius:50%; background:var(--metal); border:1px solid #6f6f74; display:inline-flex; align-items:center; justify-content:center; color:#5c5c62; font-size:10px; box-shadow:inset 0 1px 2px rgba(255,255,255,.85), inset 0 -2px 2px rgba(0,0,0,.4); text-shadow:0 -1px 1px rgba(0,0,0,.6),0 1px 1px #fff; vertical-align:-4px; }
  .meter { height:7px; border-radius:999px; background:#1d1d1c; margin:16px 0 8px; overflow:hidden; }
  .meter i { display:block; height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,#97979d,#f2f2f4); transition:width .8s cubic-bezier(.2,.8,.2,1); }
  .mrow { display:flex; justify-content:space-between; color:var(--faint); font-size:11.5px; }
  .lrow { display:flex; justify-content:space-between; gap:14px; padding:11px 0; border-top:1px solid var(--line); color:var(--dim); font-size:12.5px; align-items:center; }
  .lrow:first-of-type { border-top:0; }
  .lrow b { color:var(--ink); font-weight:500; }
  .plus { color:var(--green); }
  .pi { width:17px; height:17px; fill:currentColor; color:#b9b9b6; flex-shrink:0; }
  .dot { width:8px; height:8px; border-radius:50%; background:#3a3a38; flex-shrink:0; }
  .dot.on { background:var(--green); box-shadow:0 0 10px rgba(125,208,139,.4); }
  .dot.warn { background:var(--amber); }
  .act { display:inline-flex; align-items:center; gap:8px; margin-top:18px; margin-right:8px; font-size:12.5px; color:var(--ink); text-decoration:none; border:1px solid var(--line); border-radius:10px; padding:9px 16px; background:none; cursor:pointer; font-family:inherit; }
  .act:hover { border-color:#3a3a38; }
  .act.solid { background:var(--ink); color:#101010; border-color:var(--ink); font-weight:500; }
  .chipset { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .scope { border:1px solid var(--line); border-radius:999px; padding:3px 10px; font-size:10.5px; color:var(--dim); }
  .empty { border:1.5px dashed #2b2a28; border-radius:14px; padding:40px 24px; text-align:center; color:var(--faint); font-size:12.5px; }
  .state { font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; border:1px solid var(--line); border-radius:999px; padding:3px 10px; }
  .state.public { color:var(--green); border-color:#2c3a2e; }
  .state.scheduled { color:var(--amber); border-color:#3a332a; }
  .state.unlisted { color:var(--dim); }
  select, input[type=date] { background:#1b1b1a; border:1px solid var(--line); border-radius:8px; color:var(--ink); font:12px inherit; padding:7px 10px; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th { text-align:left; color:var(--faint); font-weight:400; font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:0 10px 10px 0; }
  td { padding:11px 10px 11px 0; border-top:1px solid var(--line); color:var(--dim); }
  td b { color:var(--ink); font-weight:500; }
  #gate { padding:130px 40px; color:var(--dim); text-align:center; }
  #app { display:none; }
  @media (max-width:760px) { .shell { grid-template-columns:1fr; } aside { position:static; height:auto; flex-direction:row; flex-wrap:wrap; } aside .foot { margin:0; border:0; padding:0; } main { padding:28px 22px 70px; } }
</style></head><body>
<div class="shell">

</svg><span class="word">Reactable</span></a>
  <a class="nv on" href="/dashboard"><svg class="ni" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Overview</a>

  <a class="nv" href="/dashboard/publishing"><svg class="ni" viewBox="0 0 24 24"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/><rect x="4" y="19" width="16" height="2" rx="1"/></svg>Publishing</a>
  <a class="nv" href="/dashboard/analytics"><svg class="ni" viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>Analytics</a>

  <div class="foot"><a class="nv" href="/api/auth/logout"><svg class="ni" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>Sign out</a></div>
</aside>
<main>
<div id="gate">Checking your session&hellip;</div>
<div id="app">
  <h1>Your <em>studio.</em></h1><p class="sub" id="who">&nbsp;</p>
  <div class="cards" style="margin-top:34px">
    <div class="card"><p class="sub">Plan</p><div class="big" id="plan" style="margin-top:6px">&mdash;</div>
      <a class="act" id="plan-act" href="/dashboard/billing">Billing</a></div>
    <div class="card"><p class="sub">Credits</p><div class="big" id="credits" style="margin-top:6px">&mdash;</div>
      <div class="meter"><i id="meter"></i></div>
      <a class="act" href="/dashboard/usage">Usage</a></div>
    <div class="card"><p class="sub">Connections</p>
      <div class="lrow"><svg class="pi" fill="currentColor" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><title>YouTube</title><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg> YouTube <span class="dot" id="d-youtube" style="margin-left:auto"></span></div>

      <a class="act" href="/dashboard/connections">Manage</a></div>
  </div>
  <h2 class="sec">Latest publishing</h2>
  <div class="card"><div id="pubs"><p class="sub">Loading&hellip;</p></div>
    <a class="act" href="/dashboard/publishing">Publishing queue</a></div>
</div>
</main></div>
<script>
window.boot = async () => {
  const me = await (await fetch('/api/auth/me')).json();
  if (!me.signedIn) { location.href = '/api/auth/login?next=/dashboard'; return null; }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  return me;
};
(async () => {
  const me = await window.boot(); if (!me) return;
  document.getElementById('who').textContent = me.user.email;
  const pro = (me.user.plan || '') === 'pro';
  document.getElementById('plan').innerHTML = pro ? 'Pro <span>$20/mo</span>' : 'Free';
  document.getElementById('d-youtube').classList.toggle('on', !!me.youtube);
  for (const p of ['meta','drive']) fetch(`/api/${p}/status`).then(r=>r.json()).then(d=>
    document.getElementById('d-'+p).classList.toggle('on', (d.connections||[]).length>0)).catch(()=>{});
  fetch('/api/gateway/usage').then(r=>r.json()).then(u=>{
    const bal=u.balance??0; document.getElementById('credits').innerHTML=bal.toLocaleString()+'<span> credits</span>';
    const cap=Math.max(5000,Math.ceil(bal/5000)*5000);
    requestAnimationFrame(()=>document.getElementById('meter').style.width=Math.min(100,bal/cap*100)+'%');
  }).catch(()=>{});
  fetch('/api/publishing/list').then(r=>r.json()).then(d=>{
    const items=(d.items||[]).slice(0,5);
    document.getElementById('pubs').innerHTML = items.length
      ? items.map(v=>`<div class="lrow"><b>${v.title||v.videoId}</b><span class="state ${v.state}">${v.state}</span><span>${v.publishAt?new Date(v.publishAt).toLocaleString():''}</span></div>`).join('')
      : '<p class="sub">Nothing published yet — record a take and tell the agent to post it.</p>';
  }).catch(()=>{});
})();
</script></body></html>
