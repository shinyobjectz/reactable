<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="Reactable">
  <defs>
    <radialGradient id="sphere" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#FF4D4D"/>
      <stop offset="45%" stop-color="#E01818"/>
      <stop offset="100%" stop-color="#4A0808"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#2A1847" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#000000"/>
  <ellipse cx="256" cy="430" rx="180" ry="48" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="148" fill="url(#sphere)" filter="url(#soft)"/>
  <circle cx="256" cy="256" r="188" stroke="#E01818" stroke-width="6" opacity="0.95"/>
  <circle cx="256" cy="256" r="188" stroke="#FF6B6B" stroke-width="1.5" opacity="0.35"/>
</svg>
